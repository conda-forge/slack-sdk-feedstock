schema_version: 1

context:
  name: slack-sdk
  version: 3.41.0

recipe:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/slack_sdk-${{ version }}.tar.gz
  sha256: eb61eb12a65bebeca9cb5d36b3f799e836ed2be21b456d15df2627cfe34076ca

build:
  number: 0

outputs:
  - package:
      name: ${{ name }}
    build:
      noarch: python
      script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
    requirements:
      host:
        - pip
        - python ${{ python_min }}.*
        - setuptools
      run:
        - python >=${{ python_min }}
    tests:
      - python:
          imports:
            - slack_sdk
            - slack_sdk.web
            - slack_sdk.webhook
            - slack_sdk.signature
            - slack_sdk.socket_mode
            - slack_sdk.audit_logs
            - slack_sdk.scim
            - slack_sdk.oauth
            - slack_sdk.models
          pip_check: true
          python_version: ${{ python_min }}.*
      - requirements:
          run:
            - python ${{ python_min }}.*
            - aiohttp
        script:
          - python -c "import slack_sdk.rtm, slack_sdk.rtm_v2"
  - package:
      name: slack_sdk
    build:
      noarch: python
    requirements:
      host:
        - python ${{ python_min }}.*
      run:
        - python >=${{ python_min }}
        - ${{ pin_subpackage(name, exact=True) }}
    tests:
      - python:
          imports:
            - slack_sdk
          python_version: ${{ python_min }}.*

about:
  homepage: https://github.com/slackapi/python-slack-sdk
  summary: The Slack API Platform SDK for Python
  license: MIT
  license_file: LICENSE
  repository: https://github.com/slackapi/python-slack-sdk
  documentation: https://github.com/slackapi/python-slack-sdk

extra:
  recipe-maintainers:
    - xylar
    - maresb
